<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>대학원 수업 자료</title>
  <style>
    :root {
      --purple-bg: #EEEDFE; --purple-text: #3C3489;
      --teal-bg: #E1F5EE;   --teal-text: #085041;
      --amber-bg: #FAEEDA;  --amber-text: #633806;
      --blue-bg: #E6F1FB;   --blue-text: #0C447C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header */
    .site-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid #e5e5e3;
      margin-bottom: 2.5rem;
    }
    .site-header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .site-header p { font-size: 14px; color: #888; }

    /* Subject grid */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 16px;
    }
    .subject-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .card-icon {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-count { font-size: 12px; color: #999; margin-top: 2px; }

    /* Document list */
    .doc-list { display: flex; flex-direction: column; gap: 6px; }
    .doc-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f8f8f6;
      text-decoration: none;
      color: #333;
      font-size: 13px;
      transition: background 0.15s;
    }
    .doc-item:hover { background: #efefed; }
    .doc-icon { font-size: 15px; flex-shrink: 0; }
    .doc-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 99px; flex-shrink: 0; font-weight: 500;
    }
    .badge-review  { background: #EEEDFE; color: #534AB7; }
    .badge-ppt     { background: #FAEEDA; color: #854F0B; }
    .badge-summary { background: #E1F5EE; color: #0F6E56; }

    .empty-note { font-size: 13px; color: #bbb; padding: 4px 2px; }

    /* Footer */
    .site-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e3;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <h1>📚 대학원 수업 자료</h1>
    <p>과목별 논문 리뷰 및 발표 자료 모음</p>
  </header>

  <div class="subject-grid">

    <!-- 사회연결망 -->
    <div class="subject-card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--purple-bg); color:var(--purple-text);">🕸️</div>
        <div>
          <div class="card-title">사회연결망</div>
          <div class="card-count" id="count-sna">자료 0개</div>
        </div>
      </div>
      <div class="doc-list" id="list-sna">
        <a class="doc-item" href="사회연결망/풀필먼트재고배치연구.html">
          <span class="doc-icon">📄</span>
          <span class="doc-name">풀필먼트 센터의 재고배치에 관한 연구</span>
          <span class="doc-badge badge-review">리뷰</span>
        </a>
      </div>
    </div>

    <!-- 인공신경망과 딥러닝 -->
    <div class="subject-card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--teal-bg); color:var(--teal-text);">🧠</div>
        <div>
          <div class="card-title">인공신경망과 딥러닝</div>
          <div class="card-count" id="count-dl">자료 0개</div>
        </div>
      </div>
      <div class="doc-list" id="list-dl">
        <div class="empty-note">아직 추가된 자료가 없습니다.</div>
      </div>
    </div>

    <!-- 핀테크와 금융법규 -->
    <div class="subject-card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--amber-bg); color:var(--amber-text);">💳</div>
        <div>
          <div class="card-title">핀테크와 금융법규</div>
          <div class="card-count" id="count-fin">자료 0개</div>
        </div>
      </div>
      <div class="doc-list" id="list-fin">
        <div class="empty-note">아직 추가된 자료가 없습니다.</div>
      </div>
    </div>

    <!-- 통계연구방법론 -->
    <div class="subject-card">
      <div class="card-header">
        <div class="card-icon" style="background:var(--blue-bg); color:var(--blue-text);">📊</div>
        <div>
          <div class="card-title">통계연구방법론</div>
          <div class="card-count" id="count-stat">자료 0개</div>
        </div>
      </div>
      <div class="doc-list" id="list-stat">
        <div class="empty-note">아직 추가된 자료가 없습니다.</div>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <p>자료를 추가하려면 각 과목 폴더에 HTML 파일을 올리고, index.html의 해당 섹션에 링크를 추가하세요.</p>
  </footer>

</div>
</body>
</html>
